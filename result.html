<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photostrip Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  </head>
  <body>
    <main class="app-shell result-page">
      <div class="result-sidebar">
        <section class="result-summary" id="resultSummary">
          <p class="eyebrow">Session Result</p>
          <h2>Your photostrip is ready.</h2>
          <p class="hero-copy">
            Download hasil akhir atau kembali ke booth untuk ambil ulang dengan
            template lain.
          </p>

          <div class="hero-actions">
            <a class="button button-secondary" href="./index.html">Retake Session</a>
            <button class="button button-primary" id="downloadButton" type="button">
              Download PNG
            </button>
          </div>

          <div class="session-meta" id="sessionMeta">
          <p class="result-event-name" id="resultEventName"></p>
          </div>
          <div class="result-inline-preview">
            <div class="result-carousel" id="resultCarousel">
              <div class="result-carousel-header">
                <p class="eyebrow result-carousel-eyebrow">Template Preview</p>
                <div class="result-carousel-actions">
                  <button class="result-carousel-nav" id="resultPrevButton" type="button" aria-label="Previous template">
                    Prev
                  </button>
                  <button class="result-carousel-nav" id="resultNextButton" type="button" aria-label="Next template">
                    Next
                  </button>
                </div>
              </div>
              <div class="result-carousel-viewport" id="resultViewport">
                <div class="result-carousel-track" id="resultTrack"></div>
              </div>
              <div class="result-carousel-footer">
                <p class="result-carousel-caption">
                  Geser untuk lihat hasil semua template, lalu download yang paling cocok.
                </p>
                <div class="result-carousel-dots" id="resultDots"></div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./js/result.js"></script>
  </body>
</html>
